name: Vercel Preview Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Lint is a signal, not a deploy gate (prototype). `next build` does not run
      # ESLint (eslint.ignoreDuringBuilds in next.config.js), so the build is the gate.
      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        run: bun run build
